name: AI Issue Resolver

on:
  issues:
    types: [labeled]

jobs:
  develop-feature:
    if: github.event.label.name == 'ai-develop'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install openai

      - name: Run AI Feature Coder
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python ai_engineer/issue_resolver.py

      - name: Push changes
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat: AI implemented issue #${ISSUE_NUM}"
          git push origin HEAD:ai/feature-${ISSUE_NUM}

      - name: Output PR Link
        run: |
          echo "AI has pushed the code! Manually create the PR here:"
          echo "https://github.com/DonTranQuiL/grocy-pro/compare/main...ai/feature-${{ github.event.issue.number }}"
